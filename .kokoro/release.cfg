# Build config for Kokoro release job.
# The build_file path is relative to the SCM checkout root.
build_file: "antigravity-sdk-py/.kokoro/release.sh"

# RBE cluster requires a container image.
container_properties {
  docker_image: "us-central1-docker.pkg.dev/kokoro-container-bakery/kokoro/ubuntu/ubuntu2204/full:current"
}

# Fetch localharness Go binaries from MPM (built by Rapid).
# Binaries land at $KOKORO_ARTIFACTS_DIR/mpm/<directory>/localharness_external.
before_action {
  fetch_mpm {
    mpm {
      pkg_name: "third_party/jetski_prod/localharness/localharness_external_linux_x86_64"
      version: "latest"
      directory: "localharness_linux_x86_64"
    }
    mpm {
      pkg_name: "third_party/jetski_prod/localharness/localharness_external_darwin_arm64"
      version: "latest"
      directory: "localharness_darwin_arm64"
    }
  }
}
